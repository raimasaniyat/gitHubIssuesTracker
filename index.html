<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>GitHub Issues Tracker</title>
    <link rel="icon" href="./assets/images/logo.png">
</head>
<body class="bg-[#F8FAFC]">
    <div class="login-container min-h-screen max-w-lg bg-white shadow mx-auto rounded-md mx-auto">
        <div class="login-wrap">
            <div class="logo w-72 mx-auto text-center pt-8 space-y-1">
                <div class="logo-image flex justify-center mb-3">
                    <img src="./assets/images/logo.png" alt="logo">
                </div>
                <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
                <p>Sign in to manage your issues</p>
            </div>
            <div class="user-data">
                <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-md">
                    <div class="card-body">
                        <fieldset class="fieldset">

                            <label class="label text-[#3D3746] font-bold">Username</label>
                            <input id="userNameInput" minlength="5" maxlength="5" type="text" class="input rounded-md" placeholder="Enter Username" />
                            <div><a class="link link-hover text-primary">Default: admin</a></div>

                            <label class="label text-[#3D3746] font-bold">Password</label>
                            <input id="userPasswordInput" minlength="8" maxlength="8" type="password" class="input rounded-md" placeholder="Enter Password" />
                            <div><a class="link link-hover text-primary">Default: admin123</a></div>

                            <button id="login-btn" class="btn btn-neutral mt-4 rounded-md bg-primary">Sign In</button>

                        </fieldset>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./assets/js/script.js"></script>
</body>
</html>
