<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Github Issues Tracker | HomePage</title>
    <link rel="icon" href="./assets/images/logo.png">
</head>
<body class="bg-[#F8FAFC]">
    <header class="bg-white shadow-sm">
        <div class="header-container max-w-[1300px] mx-auto">
            <div class="navbar">
                <div class="flex-1">
                    <div class="logo-flex flex justify-start items-center gap-2">
                        <img class="size-10" src="./assets/images/logo.png" alt="logo">
                        <h2 class="text-xl font-semibold">Github Issues Tracker</h2>
                    </div>
                </div>
                <div class="flex gap-2">
                        <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                        <button class="btn bg-primary text-white"><i class="fa-solid fa-plus"></i> Default</button>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="container w-[1140px] mx-auto py-[60px]">
            <section class="toggle-parent bg-white shadow-sm">
                <div class="ps-6 py-6">
                <button onclick="toggleStyle('allBtn')" class="bg-primary text-white px-8 py-2 rounded-md border border-[#64748B]" id="allBtn">All</button>
                <button onclick="toggleStyle('interviewBtn')" class="bg-white px-4 py-2 rounded-md text-[#64748B] border border-[#64748B]"  id="interviewBtn">Interview</button>
                <button onclick="toggleStyle('rejectedBtn')" class="bg-white px-4 py-2 rounded-md text-[#64748B] border border-[#64748B]" id="rejectedBtn">Rejected</button>
            </div>
            </section>
            <section class="issue-parent bg-white shadow-sm">
                <div class="ps-6 py-6">
                    <div class="issues-div">
                        <div class="issue-icon">
                            <h4 class="text-3xl text-primary"><i class="fa-solid fa-dharmachakra"></i></h4>
                        </div>
                        <div class="issue-texts">

                        </div>
                    </div>
                    <div class="stat-indicator">

                    </div>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
