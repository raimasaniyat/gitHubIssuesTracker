<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Github Issues Tracker | HomePage</title>
    <link rel="icon" href="./assets/images/logo.png">
</head>
<body class="bg-[#F8FAFC]">
    <header class="bg-white shadow-sm">
        <div class="header-container max-w-[1300px] mx-auto">
            <div class="navbar">
                <div class="flex-1">
                    <div class="logo-flex flex justify-start items-center gap-2">
                        <img class="size-10" src="./assets/images/logo.png" alt="logo">
                        <h2 class="text-xl font-semibold">Github Issues Tracker</h2>
                    </div>
                </div>
                <div class="flex gap-2">
                        <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                        <button class="btn bg-primary text-white"><i class="fa-solid fa-plus"></i> Default</button>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="container max-w-[1140px] mx-auto py-[60px]">
            <section class="toggle-parent bg-white shadow-sm">
                <div class="ps-6 py-6">
                <button onclick="toggleStyle('allBtn')" class="bg-primary text-white px-8 py-2 rounded-md border border-[#64748B]" id="allBtn">All</button>
                <button onclick="toggleStyle('interviewBtn')" class="bg-white px-4 py-2 rounded-md text-[#64748B] border border-[#64748B]"  id="interviewBtn">Interview</button>
                <button onclick="toggleStyle('rejectedBtn')" class="bg-white px-4 py-2 rounded-md text-[#64748B] border border-[#64748B]" id="rejectedBtn">Rejected</button>
            </div>
            </section>
            <section class="issue-parent mt-4 bg-white shadow-sm border-b-2 border-[#f2f2f2] border-solid">
                <div class="p-6 flex justify-between items-center">
                    <div class="issues-div flex items-center gap-2">
                        <div class="issue-icon bg-base-200 p-2 rounded-full">
                            <h4 class="text-3xl text-primary"><i class="fa-solid fa-dharmachakra"></i></h4>
                        </div>
                        <div class="issue-texts flex flex-col gap-0">
                            <h3 class="text-[#1F2937] font-bold"><span id="issues">50</span> Issues</h3>
                            <p class="text-[#64748B]">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="stat-indicator">
                        <ul class="flex justify-between gap-4 list-disc">
                            <li class="text-[#00A96E] mr-4 font-bold">Open</li>
                            <li class="text-[#A855F7] font-bold">Closed</li>
                        </ul>
                    </div>
                </div>
            </section>
            <section class="main bg-[#FBFBFB] shadow-sm">
                <div id="main-parent" class="p-6 grid grid-cols-4 space-y-[18px]">
                    <!-- card 1 -->
                     <div class="card-item w-[250px] shadow-md p-5 border-t-4 border-[#00A96E] border-solid rounded-md">
                        <div class="card-wrap ">
                            <div class="card-toper space-y-2">
                                <div class="card-stat flex justify-between">
                                    <div class="card-stat-icon p-2 rounded-full bg-[#CBFADB]">
                                        <p class="text-[#00A96E]"><i class="fa-regular fa-circle"></i></p>
                                    </div>
                                    <div class="card-stat-condition px-[30px] py-1 rounded-full bg-[#FECACA] text-[#EF4444] border-1 border-[#EF4444] border-solid">
                                        <p>High</p>
                                    </div>
                                </div>
                                <div class="card-content space-y-2 mb-[20px]">
                                    <h4 class="text-lg font-bold">Fix navigation menu on mobile devices</h4>
                                    <p class="text-[#64748b]">The navigation menu doesn't collapse properly on mobile devices...</p>
                                    <div class="labels flex gap-2">
                                        <div class="bugs text-[#EF4444] px-3  py-1 rounded-full bg-[#FECACA] border-1 border-[#EF4444] border-solid">
                                            <p>Bug</p>
                                        </div>
                                        <div class="assistance">
                                            <p class=" px-3  py-1 rounded-full bg-[#FDE68A] border-1 border-[#D97706] border-solid text-[#D97706]">help wanted</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <hr class="border-[#f2f2f2]">
                            <div class="card-bottom mt-[15px] text-[#64748b]">
                                <p>#1by john_doe</p> 
                                <p>1/15/2024</p>
                            </div>
                        </div>
                    </div>

                </div>
            </section>
        </div>
    </main>

    <script src="./assets/js/functional.js"></script>
</body>
</html>
